<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/grid.css">
    <title>Music Mixer</title>
</head>
<body>
    <header class="grid-con center-grid-con" id="header">
        <div class="box col-span-full">
            <h1>Music Mixer</h1>
        </div>
    </header>
    <main id="main-body">
        <audio src="audio/Around_Trimmed.mp3"></audio> <!--Audio element-->
        <section class="grid-con center-grid-con" id="stage">
            <div class="col-span-full m-col-start-2 m-col-end-12">
                <h2 class="visually-hidden">DJ Table</h2>
                <img src="images/turntables.svg" alt="Turntables" id="djtable">
                <div class="targetzone" id="zone1"></div>
                <div class="targetzone" id="zone2"></div>
                <div class="targetzone" id="zone3"></div>
                <div class="targetzone" id="zone4"></div>
                <div class="targetzone" id="zone5"></div>
            </div>
        </section>
        <section class="grid-con center-grid-con">
            <h2 class="hidden">Vinyls</h2>
            <div class="col-span-full" id="vinyls">
                <img data-trackref="Around_Trimmed" src="images/vinyl1.svg" alt="A green labelled vinyl" class="songs" draggable="true">
                <img data-trackref="In_The_Pocket_Trimmed" src="images/vinyl2.svg" alt="A blue labelled vinyl" class="songs" draggable="true">
                <img data-trackref="Slum_Lord_Trimmed" src="images/vinyl3.svg" alt="A red labelled vinyl" class="songs" draggable="true">
                <img data-trackref="The_Rumble_Trimmed" src="images/vinyl4.svg" alt="A yellow labelled vinyl" class="songs" draggable="true">
                <img data-trackref="Trian_Courtship_Trimmed" src="images/vinyl5.svg" alt="A pink labelled vinyl" class="songs" draggable="true">
            </div>
        </section>
        <section class="grid-con center-grid-con">
            <h2 class="visually-hidden">Buttons and Audio Controls</h2>
            <div class="col-span-full" id="mainbuttons">
                <button id="playButton" type="button">
                    <span class="visually-hidden">Play</span>
                </button>
                <button id="pauseButton" type="button">
                    <span class="visually-hidden">Pause</span>
                </button>
                <button id="rewindButton" type="button">
                    <span class="visually-hidden">Rewind</span>
                </button>
            </div>
            <div class="col-span-full" id="volume">
                <input id="volumeControl" type="range" min="0" max="100" step="1">
            </div>
        </section>
        <footer>
            <section class="grid-con center-grid-con" id="main-footer">
                <div class="box col-span-full">
                    <h2>Decorative Images</h2>
                </div>
            </section>
        </footer>
    </main>
    <script src="js/main.js"></script>
</body>
</html>
